<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dynamic Gradient Curve -->
  <path d="M4 28 C 10 28, 14 4, 28 4" stroke="url(#favicon-grad)" stroke-width="4" stroke-linecap="round" />
  <!-- Accent Control Point 1 -->
  <circle cx="10" cy="28" r="3" fill="#06b6d4" stroke="#ffffff" stroke-width="1.5" />
  <!-- Accent Control Point 2 -->
  <circle cx="14" cy="4" r="3" fill="#6366f1" stroke="#ffffff" stroke-width="1.5" />
  <!-- Vector lines -->
  <line x1="4" y1="28" x2="10" y2="28" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2 2" />
  <line x1="28" y1="4" x2="14" y2="4" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="2 2" />
  <defs>
    <linearGradient id="favicon-grad" x1="0%" y1="100%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#06b6d4" />
  <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>
</svg>